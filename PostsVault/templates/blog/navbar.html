

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">PostsValult</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
        <div class="navbar-nav">
          {% url 'home' as url_index %}
          {% comment %} {{url_index}} {% endcomment %}
          <a class="nav-link {% if request.path == '/' %}active{% endif %} " aria-current="page" href="{{url_index}}" title="Home">Home</a>
          {% comment %}    Using Dynamic URL Changes  {% endcomment %}
          {% url 'about-us' as url_about_us %} 
          <a class="nav-link {% if request.path == '/about-us/' %}active{% endif %}" href="{{url_about_us}}">About</a>
          <a class="nav-link {% if request.path == '/contact-us/' %}active{% endif %}" href="{% url 'contact-us' %}">Contact Us</a>
          {% if request.user.is_authenticated %}
          <a class="nav-link {% if request.path == '/dashboard/' %}active{% endif %}" href="{% url 'dashboard' %}">Dashboard</a>
          <a class="nav-link {% if request.path == '/logout/' %}active{% endif %}" href="{%url 'logout' %}">Logout</a>
          {% else %}
          <a class="nav-link {% if request.path == '/signup/' %}active{% endif %}" href="{% url 'signup' %}">Signup</a>
          <a class="nav-link {% if request.path == '/login/' %}active{% endif %}" href="{% url 'login' %}">Login</a>
          {% endif %}
          <div class="toggle-btn toggle">
          <input type="checkbox" name="checkbox" id="checkbox">
          <label for="checkbox" id = "toggle-label" class="toggle-label">
            <span class="toggle-ball"></span>
          </label>
        </div>
        </div>
      </div>
    </div>
  </nav>
